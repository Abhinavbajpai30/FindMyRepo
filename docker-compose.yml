services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: findmyrepo-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_SEARCH_API_URL: ${VITE_SEARCH_API_URL:-http://localhost:8000/search}
        VITE_USER_PREFERENCES_API: ${VITE_USER_PREFERENCES_API:-http://localhost:8000/userpreferences}
        VITE_ALL_REPOS_ENDPOINT: ${VITE_ALL_REPOS_ENDPOINT:-/allrepos}
        VITE_HIDDEN_GEMS_ENDPOINT: ${VITE_HIDDEN_GEMS_ENDPOINT:-/hiddengem}
    container_name: findmyrepo-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
